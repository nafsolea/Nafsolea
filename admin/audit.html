<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit logs — Admin Nafsoléa</title>
  <link rel="stylesheet" href="../assets/css/admin.css">
  <style>
    .audit-action {
      font-family: 'Courier New', monospace;
      font-size: .76rem;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--text-mid);
      white-space: nowrap;
    }
    .audit-action.create  { background: rgba(90,185,100,.08); border-color: rgba(90,185,100,.3); color: #2E7D32; }
    .audit-action.update  { background: rgba(59,130,246,.08); border-color: rgba(59,130,246,.3); color: #1565C0; }
    .audit-action.delete  { background: rgba(239,68,68,.08);  border-color: rgba(239,68,68,.3);  color: #C62828; }
    .audit-action.login   { background: rgba(124,158,138,.08);border-color: rgba(124,158,138,.3);color: #2E6B4F; }
    .audit-action.suspend { background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.3); color: #92400E; }
    .log-detail {
      font-size: .78rem;
      color: var(--text-muted);
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
<div class="admin-layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar__logo">
      <div class="sidebar__logo-mark">
        <svg width="16" height="16" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="5" fill="white"/>
          <line x1="18" y1="2" x2="18" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="18" y1="26" x2="18" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="2" y1="18" x2="10" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="26" y1="18" x2="34" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="sidebar__logo-text">Nafsoléa</span>
      <span class="sidebar__logo-badge">Admin</span>
    </a>
    <nav class="sidebar__nav">
      <span class="sidebar__section">Principal</span>
      <a href="index.html" class="sidebar__link"><span class="link-icon">📊</span> Dashboard</a>
      <span class="sidebar__section">Gestion</span>
      <a href="utilisateurs.html" class="sidebar__link"><span class="link-icon">👥</span> Utilisateurs</a>
      <a href="psychologues.html" class="sidebar__link"><span class="link-icon">🧠</span> Psychologues</a>
      <a href="rendez-vous.html" class="sidebar__link"><span class="link-icon">📅</span> Rendez-vous</a>
      <a href="paiements.html" class="sidebar__link"><span class="link-icon">💳</span> Paiements</a>
      <span class="sidebar__section">Contenu</span>
      <a href="blog.html" class="sidebar__link"><span class="link-icon">📝</span> Blog / Articles</a>
      <span class="sidebar__section">Système</span>
      <a href="audit.html" class="sidebar__link active"><span class="link-icon">🔍</span> Audit logs</a>
      <a href="../index.html" class="sidebar__link" target="_blank"><span class="link-icon">🌐</span> Voir le site</a>
    </nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar">A</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name">Administrateur</div>
          <div class="sidebar__user-role">Admin</div>
        </div>
      </div>
      <button class="sidebar__logout" id="logoutBtn"><span>🚪</span> Se déconnecter</button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="admin-main">
    <div class="topbar">
      <div class="topbar__left">
        <h1 class="topbar__title">Audit logs</h1>
        <span class="topbar__breadcrumb" id="totalLabel">Chargement…</span>
      </div>
      <div class="topbar__right">
        <div class="search-input-wrap">
          <span class="icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Email, action, entité…">
        </div>
        <select class="filter-select" id="actionFilter">
          <option value="">Toutes les actions</option>
          <option value="LOGIN">Login</option>
          <option value="REGISTER">Inscription</option>
          <option value="CREATE_APPOINTMENT">Réservation</option>
          <option value="CANCEL_APPOINTMENT">Annulation</option>
          <option value="APPROVE_PSY">Validation psy</option>
          <option value="REJECT_PSY">Rejet psy</option>
          <option value="SUSPEND_USER">Suspension</option>
          <option value="CREATE_ARTICLE">Article créé</option>
          <option value="DELETE_ARTICLE">Article supprimé</option>
        </select>
        <input type="date" class="filter-select" id="dateFilter" title="Date">
      </div>
    </div>

    <div class="page-content">
      <div class="card">
        <div class="card__header">
          <span class="card__title">Journal d'activité</span>
          <button class="btn btn-outline btn-sm" id="refreshBtn">↻ Actualiser</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Horodatage</th>
                <th>Utilisateur</th>
                <th>Action</th>
                <th>Entité</th>
                <th>Détails</th>
                <th>IP</th>
              </tr>
            </thead>
            <tbody id="auditTable">
              <tr><td colspan="6"><div class="skeleton" style="height:14px;margin:12px 16px"></div></td></tr>
              <tr><td colspan="6"><div class="skeleton" style="height:14px;margin:12px 16px"></div></td></tr>
              <tr><td colspan="6"><div class="skeleton" style="height:14px;margin:12px 16px"></div></td></tr>
              <tr><td colspan="6"><div class="skeleton" style="height:14px;margin:12px 16px"></div></td></tr>
              <tr><td colspan="6"><div class="skeleton" style="height:14px;margin:12px 16px"></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="card__footer">
          <div class="pagination">
            <span class="pagination__info" id="paginationInfo"></span>
            <div class="pagination__pages" id="paginationPages"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  if (!Auth.requireRole('ADMIN')) {}
  document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());

  let currentPage = 1;
  let searchTimeout;

  function toast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3500);
  }

  function fmtDateTime(d) {
    if (!d) return '—';
    return new Date(d).toLocaleString('fr-FR', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  }

  function actionClass(action = '') {
    const a = action.toLowerCase();
    if (a.includes('create') || a.includes('register') || a.includes('approve')) return 'create';
    if (a.includes('update') || a.includes('edit'))   return 'update';
    if (a.includes('delete') || a.includes('reject') || a.includes('suspend')) return 'delete';
    if (a.includes('login'))  return 'login';
    if (a.includes('cancel') || a.includes('suspend')) return 'suspend';
    return '';
  }

  function safeJson(obj) {
    if (!obj) return '—';
    if (typeof obj === 'string') return obj;
    try { return JSON.stringify(obj).slice(0, 80); } catch { return '—'; }
  }

  async function loadLogs(page = 1) {
    const params = { page, limit: 25 };
    const search = document.getElementById('searchInput').value.trim();
    const action = document.getElementById('actionFilter').value;
    const date   = document.getElementById('dateFilter').value;

    if (search) params.search = search;
    if (action) params.action = action;
    if (date)   params.date   = date;

    try {
      const res = await API.admin.auditLogs(params);
      const { data = [], meta = {} } = res;
      currentPage = page;

      document.getElementById('totalLabel').textContent =
        `${meta.total ?? data.length} événements`;

      if (!data.length) {
        document.getElementById('auditTable').innerHTML = `
          <tr><td colspan="6">
            <div class="empty-state">
              <span class="empty-state__icon">🔍</span>
              <span class="empty-state__title">Aucun log trouvé</span>
            </div>
          </td></tr>`;
        document.getElementById('paginationInfo').textContent = '';
        document.getElementById('paginationPages').innerHTML = '';
        return;
      }

      document.getElementById('auditTable').innerHTML = data.map(log => `
        <tr>
          <td class="td-muted" style="white-space:nowrap;font-size:.8rem">${fmtDateTime(log.createdAt)}</td>
          <td>
            <div class="td-bold" style="font-size:.84rem">${log.user?.email ?? log.userEmail ?? '—'}</div>
            <div class="td-muted" style="font-size:.74rem">${log.user?.role ?? ''}</div>
          </td>
          <td><span class="audit-action ${actionClass(log.action)}">${log.action ?? '—'}</span></td>
          <td class="td-muted" style="font-size:.82rem">${log.entity ?? '—'} ${log.entityId ? `<span style="opacity:.5">#${String(log.entityId).slice(-6)}</span>` : ''}</td>
          <td><div class="log-detail" title="${safeJson(log.details)}">${safeJson(log.details)}</div></td>
          <td class="td-muted" style="font-size:.78rem;font-family:monospace">${log.ipAddress ?? '—'}</td>
        </tr>
      `).join('');

      // Pagination
      const pages = meta.pages || 1;
      document.getElementById('paginationInfo').textContent =
        `Page ${page} sur ${pages} · ${meta.total ?? data.length} événements`;

      const pagesEl = document.getElementById('paginationPages');
      pagesEl.innerHTML = '';
      if (pages > 1) {
        const addBtn = (label, p, disabled = false) => {
          const btn = document.createElement('button');
          btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
          btn.textContent = label;
          btn.disabled = disabled;
          btn.addEventListener('click', () => loadLogs(p));
          pagesEl.appendChild(btn);
        };
        addBtn('←', page - 1, page === 1);
        for (let i = 1; i <= pages; i++) {
          if (i === 1 || i === pages || Math.abs(i - page) <= 1) addBtn(i, i);
          else if (Math.abs(i - page) === 2) {
            const s = document.createElement('span');
            s.textContent = '…'; s.style.padding = '0 4px';
            pagesEl.appendChild(s);
          }
        }
        addBtn('→', page + 1, page === pages);
      }

    } catch (err) {
      toast('Erreur: ' + err.message, 'error');
      document.getElementById('auditTable').innerHTML = `
        <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">
          Impossible de charger les logs. <button onclick="loadLogs(1)" style="color:var(--blue);border:none;background:none;cursor:pointer;text-decoration:underline">Réessayer</button>
        </td></tr>`;
    }
  }

  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => loadLogs(1), 400);
  });
  document.getElementById('actionFilter').addEventListener('change', () => loadLogs(1));
  document.getElementById('dateFilter').addEventListener('change', () => loadLogs(1));
  document.getElementById('refreshBtn').addEventListener('click', () => loadLogs(currentPage));

  loadLogs(1);
</script>
</body>
</html>
