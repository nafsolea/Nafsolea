<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Désabonnement — Nafsoléa</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .unsub-wrap { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .unsub-card { max-width: 500px; background: white; border-radius: 16px; padding: 3rem 2rem; text-align: center; box-shadow: 0 6px 30px rgba(0,0,0,.06); }
    .unsub-card h1 { margin: 0 0 1rem; }
    .unsub-card p { color: var(--text-light, #555); margin: 0 0 1.5rem; }
    .unsub-icon { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>

<header class="header" role="banner">
  <div class="container header__container">
    <a href="index.html" class="header__logo">
      <span class="header__logo-text">Nafsoléa</span>
    </a>
  </div>
</header>

<main class="unsub-wrap">
  <div class="unsub-card" id="card">
    <div class="unsub-icon">⏳</div>
    <h1>Traitement en cours…</h1>
    <p>Nous traitons votre demande de désabonnement.</p>
  </div>
</main>

<script src="assets/js/api.js"></script>
<script>
(async function() {
  const card = document.getElementById('card');
  const params = new URLSearchParams(location.search);
  const token = params.get('token');

  if (!token) {
    card.innerHTML = `
      <div class="unsub-icon">⚠️</div>
      <h1>Lien invalide</h1>
      <p>Aucun token de désabonnement n'a été fourni dans le lien.</p>
      <a href="index.html" class="btn btn--primary">Retour à l'accueil</a>
    `;
    return;
  }

  try {
    await API.newsletter.unsubscribe(token);
    card.innerHTML = `
      <div class="unsub-icon">✅</div>
      <h1>Désabonnement confirmé</h1>
      <p>Vous ne recevrez plus la newsletter Nafsoléa. Vous pouvez vous réinscrire à tout moment depuis notre site.</p>
      <a href="index.html" class="btn btn--primary">Retour à l'accueil</a>
    `;
  } catch (e) {
    card.innerHTML = `
      <div class="unsub-icon">❌</div>
      <h1>Erreur</h1>
      <p>${e.message || 'Le lien est invalide ou a expiré.'}</p>
      <a href="index.html" class="btn btn--primary">Retour à l'accueil</a>
    `;
  }
})();
</script>
</body>
</html>
